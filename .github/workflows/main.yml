name: ARISTA MATRIX PIPELINE

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

concurrency:
  group: arista-matrix
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: 1

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Restore Rolling State
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: arista-output
          path: output

      - name: Prepare Bank
        run: |
          mkdir -p output
          if [ ! -s output/ip_bank.txt ]; then
            python downloader.py || true
          fi
          if [ ! -s output/clean_ips.txt ]; then
            python cleaner.py || true
          fi
          touch output/.keep

      - name: Save Rolling State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: output
          overwrite: true
          retention-days: 3

  tcp:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore State
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: arista-output
          path: output

      - name: TCP Scan
        run: |
          python main.py --tcp || true

      - name: Save State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: output
          overwrite: true
          retention-days: 3

  tls:
    needs: tcp
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore State
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: arista-output
          path: output

      - name: TLS Scan
        run: |
          ulimit -n 4096
          python main.py --tls || true

      - name: Save State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: output
          overwrite: true
          retention-days: 3

  https:
    needs: tls
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore State
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: arista-output
          path: output

      - name: HTTPS Validation
        run: |
          python main.py --https || true

      - name: Save State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: output
          overwrite: true
          retention-days: 3

  fingerprint:
    needs: https
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore State
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: arista-output
          path: output

      - name: Fingerprint
        run: |
          python main.py --fp || true

      - name: Save State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: output
          overwrite: true
          retention-days: 3

  geo:
    needs: fingerprint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore State
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: arista-output
          path: output

      - name: GEO
        run: |
          python main.py --geo || true

      - name: Save State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: output
          overwrite: true
          retention-days: 3

  finalize:
    needs: geo
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Restore State
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: arista-output
          path: output

      - name: Finalize
        run: |
          python main.py --finalize || true

      - name: Save Final State
        uses: actions/upload-artifact@v4
        with:
          name: arista-output
          path: output
          overwrite: true
          retention-days: 3

      - name: Commit Final Output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p output
          [ -f output/best_ips.txt ] && git add output/best_ips.txt
          [ -f output/domains.txt ] && git add output/domains.txt
          [ -f output/results.txt ] && git add output/results.txt
          [ -f output/scan_cursor.txt ] && git add output/scan_cursor.txt
          [ -f output/current_part.txt ] && git add output/current_part.txt
          [ -f output/tcp_live.txt ] && git add output/tcp_live.txt
          [ -f output/tls_live.txt ] && git add output/tls_live.txt
          [ -f output/https_live.txt ] && git add output/https_live.txt
          [ -f output/fingerprint_results.txt ] && git add output/fingerprint_results.txt
          [ -f output/scanned_cache.txt ] && git add output/scanned_cache.txt
          [ -f output/geo_cache.json ] && git add output/geo_cache.json
          [ -f output/live_bank.txt ] && git add output/live_bank.txt
          if ! git diff --cached --quiet; then
            git commit -m "ARISTA $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            for i in 1 2 3; do
              git fetch origin main
              if git rebase origin/main; then
                git push origin HEAD:main && exit 0
              fi
              git rebase --abort || true
              sleep 10
            done
            exit 1
          fi
