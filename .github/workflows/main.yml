name: ARISTA MATRIX PIPELINE

on:
  workflow_dispatch:
    inputs:
      CUSTOM_CAPTION:
        description: 'Custom Caption for Telegram'
        required: false
        default: ''
      IP_COUNT_LIMIT:
        description: 'Max IP Count'
        required: false
        default: '1000'
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

concurrency: 
  group: arista-matrix
  cancel-in-progress: false

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: 1

jobs:
  check-and-run:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check if already running
        id: check
        run: |
          RUNNING=false
          if curl -s -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
             "https://api.github.com/repos/${{ github.repository }}/actions/runs?status=in_progress&branch=${{ github.ref_name }}" \
             | grep -q "\"id\":"; then
            RUNNING=true
          fi
          echo "should_run=$([ "$RUNNING" = false ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT
          echo "Running check: $RUNNING"

  prepare:
    needs: check-and-run
    if: needs.check-and-run.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure Output Directory Exists
        run: |
          mkdir -p output
          touch output/.keep

      - name: Prepare Bank
        run: |
          if [ ! -s output/ip_bank.txt ]; then
            python downloader.py
          fi
          if [ ! -s output/clean_ips.txt ]; then
            python cleaner.py
          fi

      - name: Compact Cache
        run: |
          python -c "from cache import compact_cache_files; compact_cache_files()"

      - name: Cleanup Before Save
        run: |
          if [ -f cleanup.py ]; then python cleanup.py; else echo "WARNING: cleanup.py missing, skipping."; fi

  tcp:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 55

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt

      - name: TCP Scan
        run: python main.py --tcp

      - name: Cleanup After Scan
        run: |
          if [ -f cleanup.py ]; then python cleanup.py; else echo "WARNING: cleanup.py missing, skipping."; fi

  tls:
    needs: tcp
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt

      - name: TLS Scan
        run: python main.py --tls

      - name: Cleanup After Scan
        run: |
          if [ -f cleanup.py ]; then python cleanup.py; else echo "WARNING: cleanup.py missing, skipping."; fi

  https:
    needs: tls
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt

      - name: HTTPS Validation
        run: python main.py --https

      - name: Cleanup After Scan
        run: |
          if [ -f cleanup.py ]; then python cleanup.py; else echo "WARNING: cleanup.py missing, skipping."; fi

  fingerprint:
    needs: https
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Fingerprint
        run: python main.py --fp

      - name: Cleanup After Scan
        run: |
          if [ -f cleanup.py ]; then python cleanup.py; else echo "WARNING: cleanup.py missing, skipping."; fi

  geo:
    needs: fingerprint
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt

      - name: GEO
        run: python main.py --geo

      - name: Cleanup After Scan
        run: |
          if [ -f cleanup.py ]; then python cleanup.py; else echo "WARNING: cleanup.py missing, skipping."; fi

  finalize:
    needs: geo
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Finalize
        run: python main.py --finalize

      - name: Run Telegram Bot Clean & Send
        continue-on-error: true
        env:
          CUSTOM_CAPTION: ${{ github.event.inputs.CUSTOM_CAPTION || vars.CUSTOM_CAPTION }}
          IP_COUNT_LIMIT: ${{ github.event.inputs.IP_COUNT_LIMIT || vars.IP_COUNT_LIMIT }}
        run: python send_to_telegram.py

      - name: Cleanup After Scan
        run: |
          if [ -f cleanup.py ]; then python cleanup.py; else echo "WARNING: cleanup.py missing, skipping."; fi

      - name: Commit Final Output
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          mkdir -p output

          git add output/best_ips.txt output/domains.txt output/results.txt 2>/dev/null || true
          git add output/scan_cursor.txt output/current_part.txt 2>/dev/null || true
          git add output/tcp_live.txt output/tls_live.txt output/https_live.txt 2>/dev/null || true
          git add output/fingerprint_results.txt output/scanned_cache.txt 2>/dev/null || true
          git add output/geo_cache.json output/live_bank.txt 2>/dev/null || true

          if ! git diff --cached --quiet; then
            git commit -m "ARISTA $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            git push origin HEAD:main
          fi
